name: Cron Ausencias Hoy (Impacto + XLS)

on:
  schedule:
    - cron: "*/5 * * * *"   # Cada 5 minutos (UTC). El PHP decide y solo envía a las 07:55 America/Santiago.
  workflow_dispatch:

concurrency:
  group: cron-ausencias-hoy
  cancel-in-progress: true

jobs:
  ejecutar:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Llamar cron por HTTP
        env:
          CRON_URL: ${{ secrets.CRON_URL }}
          CRON_TOKEN: ${{ secrets.CRON_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${CRON_URL:-}" ] || [ -z "${CRON_TOKEN:-}" ]; then
            echo "Faltan secrets: CRON_URL y/o CRON_TOKEN"
            exit 1
          fi

          # Si la URL ya trae querystring, usamos &; si no, usamos ?
          SEP='?'
          case "$CRON_URL" in
            *\?*) SEP='&' ;;
          esac

          FINAL_URL="${CRON_URL}${SEP}token=${CRON_TOKEN}"

          echo "GET $FINAL_URL"

          # Reintentos suaves por si hay microcortes
          curl -fsS --retry 3 --retry-delay 5 --connect-timeout 15 --max-time 90 \
            "$FINAL_URL" | head -c 2000
          echo ""
